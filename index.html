<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PID LIVE — dispečink Prahy</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<style>
  :root{
    --bg:#0b0d11; --panel:rgba(13,16,22,.88); --line:#232a35;
    --text:#d7dde6; --dim:#7a8494;
    --tram:#ff5c39; --metro:#21d07c; --train:#ffc93c; --bus:#3fa7ff;
    --ferry:#35e0d6; --funi:#ff7ecb; --trolley:#b983ff;
    --hot:#ff2d55;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body,#map{height:100%;width:100%;background:var(--bg);overflow:hidden}
  body{font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--text)}

  .panel{
    position:fixed;top:12px;left:12px;z-index:10;width:236px;
    background:var(--panel);backdrop-filter:blur(10px);
    border:1px solid var(--line);border-radius:10px;padding:14px 14px 10px;
  }
  .brand{display:flex;align-items:baseline;gap:8px}
  .brand h1{font-size:15px;letter-spacing:.14em;font-weight:700}
  .live{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--dim);letter-spacing:.1em}
  .live::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--hot);
    animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  @media (prefers-reduced-motion:reduce){.live::before{animation:none}}

  .stats{display:flex;gap:14px;margin:10px 0 12px}
  .stat b{display:block;font-size:20px;font-weight:700;line-height:1.1}
  .stat span{font-size:9px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase}
  #avgDelay.warn{color:#ffc93c}
  #avgDelay.bad{color:var(--hot)}

  .types{display:flex;flex-direction:column;gap:2px;border-top:1px solid var(--line);padding-top:8px}
  .type{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:6px;cursor:pointer;
    font-size:11px;user-select:none;transition:background .12s}
  .type:hover{background:rgba(255,255,255,.05)}
  .type .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .type .cnt{margin-left:auto;color:var(--dim);font-size:10px}
  .type.off{opacity:.32}
  .type.off .dot{background:var(--dim)!important}

  .heatToggle{
    margin-top:10px;width:100%;padding:8px;border-radius:7px;border:1px solid var(--line);
    background:transparent;color:var(--text);font:inherit;font-size:11px;letter-spacing:.08em;
    cursor:pointer;transition:all .15s;
  }
  .heatToggle.on{background:rgba(255,45,85,.14);border-color:var(--hot);color:#ff8fa3}
  .status{margin-top:8px;font-size:9px;color:var(--dim);min-height:12px}

  .maplibregl-popup-content{
    background:var(--panel)!important;color:var(--text);border:1px solid var(--line);
    border-radius:8px;font-family:inherit;font-size:12px;padding:10px 12px;
  }
  .maplibregl-popup-tip{border-top-color:var(--line)!important;border-bottom-color:var(--line)!important}
  .pp b{font-size:14px}
  .pp .d{color:var(--dim);font-size:10px;margin-top:2px}

  @media(max-width:520px){.panel{width:calc(100% - 24px)}}
</style>
</head>
<body>
<div id="map"></div>

<div class="panel">
  <div class="brand"><h1>PID LIVE</h1><span class="live">PRAHA</span></div>
  <div class="stats">
    <div class="stat"><b id="count">—</b><span>vozidel</span></div>
    <div class="stat"><b id="avgDelay">—</b><span>prům. zpoždění</span></div>
  </div>
  <div class="types" id="types"></div>
  <button class="heatToggle" id="heatBtn">🔥 zóny zpoždění: vyp</button>
  <div class="status" id="status">připojuji…</div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
// Primary: Vercel serverless proxy (same origin). Fallback: Supabase edge function.
const API_LOCAL = "/api/pid";
const API_FALLBACK = "https://uzenopkyiwxdrpyddpjz.supabase.co/functions/v1/pid-live";
let API = location.protocol === "file:" ? API_FALLBACK : API_LOCAL;
const POLL_MS = 10000;

// route_type -> config
const TYPES = {
  0:{key:"tram",   label:"Tramvaj",    color:"#ff5c39"},
  1:{key:"metro",  label:"Metro",      color:"#21d07c"},
  2:{key:"train",  label:"Vlak",       color:"#ffc93c"},
  3:{key:"bus",    label:"Autobus",    color:"#3fa7ff"},
  4:{key:"ferry",  label:"Přívoz",     color:"#35e0d6"},
  7:{key:"funi",   label:"Lanovka",    color:"#ff7ecb"},
  11:{key:"trolley",label:"Trolejbus", color:"#b983ff"},
};
const FALLBACK_TYPE = 3;
const norm = t => TYPES[t] ? t : (t===800 ? 11 : FALLBACK_TYPE);

// ---- simple line-art glyphs (white strokes/fills on colored disc) ----
const GLYPHS = {
  tram: `<path d="M13 4 L19 4 M16 4 V8" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <rect x="9.5" y="8" width="13" height="14" rx="3" fill="none" stroke="#fff" stroke-width="1.8"/>
    <rect x="12" y="11" width="3.4" height="4" rx="1" fill="#fff"/>
    <rect x="16.8" y="11" width="3.4" height="4" rx="1" fill="#fff"/>
    <line x1="10" y1="18.4" x2="22" y2="18.4" stroke="#fff" stroke-width="1.4"/>
    <circle cx="13" cy="24.6" r="1.5" fill="#fff"/><circle cx="19" cy="24.6" r="1.5" fill="#fff"/>`,
  metro: `<path d="M8 23 V13 a8 8 0 0 1 16 0 V23" fill="none" stroke="#fff" stroke-width="1.9"/>
    <path d="M12 20 v-7 l4 5 4-5 v7" fill="none" stroke="#fff" stroke-width="1.9" stroke-linejoin="round" stroke-linecap="round"/>`,
  train: `<rect x="9.5" y="6.5" width="13" height="13.5" rx="4" fill="none" stroke="#fff" stroke-width="1.8"/>
    <rect x="12" y="9.5" width="8" height="4" rx="1.2" fill="#fff"/>
    <circle cx="16" cy="17" r="1.6" fill="#fff"/>
    <path d="M11.5 22.5 L9.5 25.5 M20.5 22.5 L22.5 25.5" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="12.4" y1="24" x2="19.6" y2="24" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>`,
  bus: `<rect x="8.5" y="7.5" width="15" height="15" rx="3" fill="none" stroke="#fff" stroke-width="1.8"/>
    <line x1="8.5" y1="16.5" x2="23.5" y2="16.5" stroke="#fff" stroke-width="1.4"/>
    <rect x="11" y="10.2" width="4.2" height="3.6" rx="1" fill="#fff"/>
    <rect x="16.8" y="10.2" width="4.2" height="3.6" rx="1" fill="#fff"/>
    <circle cx="12.2" cy="24.4" r="1.7" fill="#fff"/><circle cx="19.8" cy="24.4" r="1.7" fill="#fff"/>`,
  ferry: `<path d="M8 19 h16 l-2.5 4.5 h-11 z" fill="#fff"/>
    <path d="M12 19 v-5 h8 v5" fill="none" stroke="#fff" stroke-width="1.8"/>
    <line x1="16" y1="14" x2="16" y2="9.5" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M7 26 q2 -1.6 4 0 t4 0 t4 0 t4 0" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>`,
  funi: `<line x1="6" y1="10" x2="26" y2="18" stroke="#fff" stroke-width="1.5"/>
    <line x1="16" y1="13.8" x2="16" y2="16.5" stroke="#fff" stroke-width="1.6"/>
    <rect x="10.5" y="16.5" width="11" height="8" rx="2" fill="none" stroke="#fff" stroke-width="1.8"/>
    <line x1="10.5" y1="20.4" x2="21.5" y2="20.4" stroke="#fff" stroke-width="1.3"/>`,
  trolley: `<path d="M12 8 L8.5 3.5 M20 8 L23.5 3.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="8.5" y="8" width="15" height="13.5" rx="3" fill="none" stroke="#fff" stroke-width="1.8"/>
    <line x1="8.5" y1="16" x2="23.5" y2="16" stroke="#fff" stroke-width="1.3"/>
    <rect x="11" y="10.5" width="4.2" height="3.4" rx="1" fill="#fff"/>
    <rect x="16.8" y="10.5" width="4.2" height="3.4" rx="1" fill="#fff"/>
    <circle cx="12.2" cy="23.6" r="1.6" fill="#fff"/><circle cx="19.8" cy="23.6" r="1.6" fill="#fff"/>`,
};

function iconSVG(color, glyph){
  return `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
    <circle cx="16" cy="16" r="14.5" fill="${color}" stroke="rgba(0,0,0,.55)" stroke-width="1.5"/>
    ${glyph}</svg>`;
}
function loadIcon(map, name, color, glyph){
  return new Promise(res=>{
    const img = new Image(64,64);
    img.onload = ()=>{ map.addImage(name, img, {pixelRatio:2}); res(); };
    img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(iconSVG(color, glyph));
  });
}

const map = new maplibregl.Map({
  container:"map",
  style:"https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
  center:[14.42, 50.08],
  zoom:11.3,
  attributionControl:{compact:true},
});
map.addControl(new maplibregl.NavigationControl({showCompass:false}), "bottom-right");
map.addControl(new maplibregl.GeolocateControl({
  positionOptions:{enableHighAccuracy:true},
  fitBoundsOptions:{maxZoom:18.5},
  trackUserLocation:false,
  showAccuracyCircle:true
}), "bottom-right");

const hidden = new Set();       // hidden route_types
let heatOn = false;
let lastData = [];

function toGeoJSON(rows){
  return {type:"FeatureCollection", features: rows.map(r=>({
    type:"Feature",
    geometry:{type:"Point", coordinates:[r[1], r[0]]},
    properties:{delay:r[3], rt:norm(r[4]), route:r[5]}
  }))};
}

function render(){
  const rows = lastData.filter(r=>!hidden.has(norm(r[4])));
  const gj = toGeoJSON(rows);
  const src = map.getSource("vehicles");
  if (src) src.setData(gj);

  // stats (over visible)
  document.getElementById("count").textContent = rows.length;
  const delays = rows.map(r=>Math.max(0,r[3]));
  const avg = delays.length ? delays.reduce((a,b)=>a+b,0)/delays.length : 0;
  const el = document.getElementById("avgDelay");
  el.textContent = avg>=60 ? (avg/60).toFixed(1)+" min" : Math.round(avg)+" s";
  el.className = avg>180 ? "bad" : (avg>90 ? "warn" : "");

  // per-type counts
  const counts = {};
  for (const r of lastData){ const t=norm(r[4]); counts[t]=(counts[t]||0)+1; }
  for (const t in TYPES){
    const c = document.querySelector(`[data-cnt="${t}"]`);
    if (c) c.textContent = counts[t]||0;
  }
}

async function poll(){
  try{
    const r = await fetch(API);
    const j = await r.json();
    if (j.error){
      document.getElementById("status").textContent =
        j.error==="missing_api_key" ? "⚠ chybí GOLEMIO_API_KEY na serveru" : "⚠ chyba dat: "+j.error;
      return;
    }
    lastData = j.v || [];
    render();
    document.getElementById("status").textContent =
      "aktualizováno " + new Date().toLocaleTimeString("cs-CZ");
  }catch(e){
    if (API === API_LOCAL){ API = API_FALLBACK; return poll(); }
    document.getElementById("status").textContent = "⚠ spojení selhalo, zkouším dál…";
  }
}

map.on("load", async ()=>{
  // icons
  await Promise.all(Object.entries(TYPES).map(([t,cfg])=>loadIcon(map,"ic-"+t,cfg.color,GLYPHS[cfg.key])));

  map.addSource("vehicles",{type:"geojson",data:toGeoJSON([])});

  // delay heat — signature layer, under the icons
  map.addLayer({
    id:"delay-heat", type:"heatmap", source:"vehicles",
    layout:{visibility:"none"},
    paint:{
      "heatmap-weight":["interpolate",["linear"],["get","delay"],60,0,120,.25,300,.7,600,1],
      "heatmap-intensity":["interpolate",["linear"],["zoom"],9,.7,14,1.6],
      "heatmap-radius":["interpolate",["linear"],["zoom"],9,22,14,55],
      "heatmap-color":["interpolate",["linear"],["heatmap-density"],
        0,"rgba(0,0,0,0)", .25,"rgba(120,20,60,.28)", .5,"rgba(220,40,80,.45)",
        .75,"rgba(255,45,85,.65)", 1,"rgba(255,120,90,.85)"],
      "heatmap-opacity":.9
    }
  });

  map.addLayer({
    id:"vehicles-icons", type:"symbol", source:"vehicles",
    layout:{
      "icon-image":["concat","ic-",["to-string",["get","rt"]]],
      "icon-size":["interpolate",["linear"],["zoom"],9,.45,12,.62,15,.85],
      "icon-allow-overlap":true,
      "icon-ignore-placement":true,
      "symbol-sort-key":["-",0,["get","delay"]]
    }
  });

  map.on("click","vehicles-icons",e=>{
    const p = e.features[0].properties;
    const cfg = TYPES[p.rt]||TYPES[3];
    const d = +p.delay;
    const dl = d>=60 ? "+"+(d/60).toFixed(1)+" min" : (d>0 ? "+"+d+" s" : "včas");
    new maplibregl.Popup({closeButton:false,offset:14})
      .setLngLat(e.features[0].geometry.coordinates)
      .setHTML(`<div class="pp"><b style="color:${cfg.color}">${cfg.label} ${p.route||""}</b>
        <div class="d">zpoždění: ${dl}</div></div>`)
      .addTo(map);
  });
  map.on("mouseenter","vehicles-icons",()=>map.getCanvas().style.cursor="pointer");
  map.on("mouseleave","vehicles-icons",()=>map.getCanvas().style.cursor="");

  poll();
  setInterval(poll, POLL_MS);
});

// build type toggles
const typesEl = document.getElementById("types");
for (const [t,cfg] of Object.entries(TYPES)){
  const row = document.createElement("div");
  row.className = "type"; row.dataset.t = t;
  row.innerHTML = `<span class="dot" style="background:${cfg.color}"></span>${cfg.label}
    <span class="cnt" data-cnt="${t}">0</span>`;
  row.onclick = ()=>{
    const tt = +t;
    hidden.has(tt) ? hidden.delete(tt) : hidden.add(tt);
    row.classList.toggle("off", hidden.has(tt));
    render();
  };
  typesEl.appendChild(row);
}

document.getElementById("heatBtn").onclick = function(){
  heatOn = !heatOn;
  this.classList.toggle("on", heatOn);
  this.textContent = "🔥 zóny zpoždění: " + (heatOn ? "zap" : "vyp");
  if (map.getLayer("delay-heat"))
    map.setLayoutProperty("delay-heat","visibility", heatOn ? "visible" : "none");
};
</script>
</body>
</html>
